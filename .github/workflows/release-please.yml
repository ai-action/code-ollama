name: release-please
on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: node

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --prefer-offline --ignore-scripts

      - name: Publish
        run: npm publish --provenance --access public

  build:
    runs-on: ${{ matrix.os }}
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            executable: code-ollama
          - os: ubuntu-24.04-arm
            target: linux-arm64
            executable: code-ollama
          - os: macos-latest
            target: darwin-arm64
            executable: code-ollama
          - os: windows-latest
            target: windows-x64
            executable: code-ollama.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build SEA
        uses: ./.github/actions/build-sea
        with:
          executable: ${{ matrix.executable }}

      - name: Archive and upload executable
        if: runner.os != 'Windows'
        run: |
          archive="release/code-ollama-${TAG_NAME}-${TARGET}.tar.gz"
          tar -czf "$archive" -C release "${{ matrix.executable }}"
          gh release upload "$TAG_NAME" "$archive" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          TARGET: ${{ matrix.target }}

      - name: Archive and upload executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "release/code-ollama-$env:TAG_NAME-$env:TARGET.zip"
          Compress-Archive -Path "release/${{ matrix.executable }}" -DestinationPath $archive
          gh release upload $env:TAG_NAME $archive --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
